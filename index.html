<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block Blast Clone - Smooth Placement</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --cell-color: #1e293b;
            --cell-active: #334155;
        }
        body {
            background-color: var(--bg-color);
            color: white;
            user-select: none;
            touch-action: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 6px;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1 / 1;
            background-color: #1e293b;
            padding: 8px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .cell {
            background-color: #0f172a;
            border-radius: 6px;
            transition: background-color 0.15s ease;
        }
        .cell.filled {
            box-shadow: inset 0 0 12px rgba(0,0,0,0.4);
        }
        .piece-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            width: 100%;
            max-width: 420px;
            height: 140px;
            margin-top: 2rem;
            background: rgba(30, 41, 59, 0.5);
            border-radius: 20px;
            padding: 10px;
        }
        .piece {
            display: grid;
            gap: 3px;
            cursor: grab;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .piece:hover {
            transform: scale(1.05);
        }
        .piece-cell {
            width: 24px;
            height: 24px;
            border-radius: 4px;
        }
        .dragging {
            opacity: 0.9;
            transform: scale(1);
            position: fixed;
            pointer-events: none;
            z-index: 100;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="text-center mb-8">
        <h1 class="text-5xl font-black mb-2 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">BLOCK BLAST</h1>
        <div class="bg-slate-800 px-6 py-2 rounded-full inline-block border border-slate-700">
            <p class="text-xl font-bold">Skor: <span id="score" class="text-yellow-400">0</span></p>
        </div>
    </div>

    <!-- Papan Game -->
    <div id="grid" class="grid-container"></div>

    <!-- Slot untuk 3 Blok Baru -->
    <div id="piece-slots" class="piece-container"></div>

    <!-- Modal Game Over -->
    <div id="game-over" class="fixed inset-0 bg-black/90 hidden flex-col items-center justify-center z-[200] backdrop-blur-sm">
        <div class="bg-slate-800 p-10 rounded-3xl border-4 border-red-500 text-center shadow-2xl">
            <h2 class="text-6xl font-black text-red-500 mb-4 italic">TAMAT!</h2>
            <p class="text-2xl mb-8 text-slate-300">Skor Akhir Kamu:<br><span id="final-score" class="text-5xl font-bold text-white">0</span></p>
            <button onclick="resetGame()" class="px-10 py-4 bg-gradient-to-r from-blue-500 to-blue-700 hover:from-blue-400 hover:to-blue-600 rounded-2xl font-black text-2xl transition-all transform hover:scale-110 active:scale-95 shadow-lg">
                MAIN LAGI
            </button>
        </div>
    </div>

    <script>
        const GRID_SIZE = 8;
        const gridElement = document.getElementById('grid');
        const pieceSlots = document.getElementById('piece-slots');
        const scoreElement = document.getElementById('score');
        const gameOverModal = document.getElementById('game-over');
        const finalScoreElement = document.getElementById('final-score');

        let score = 0;
        let grid = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(0));
        let activePiecesData = [];
        
        const PIECE_TYPES = [
            { shape: [[1, 1], [1, 1]], color: '#ef4444' }, // Kotak 2x2
            { shape: [[1, 1, 1]], color: '#3b82f6' },       // Garis 3x1
            { shape: [[1], [1], [1]], color: '#3b82f6' },    // Garis 1x3
            { shape: [[1, 1, 1, 1]], color: '#10b981' },    // Garis 4x1
            { shape: [[1, 0], [1, 0], [1, 1]], color: '#f59e0b' }, // L
            { shape: [[1]], color: '#8b5cf6' },             // Titik
            { shape: [[1, 1], [1, 0]], color: '#ec4899' },    // Siku
            { shape: [[0, 1, 0], [1, 1, 1]], color: '#6366f1' } // T
        ];

        function initGrid() {
            gridElement.innerHTML = '';
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    gridElement.appendChild(cell);
                }
            }
        }

        function generateNewPieces() {
            pieceSlots.innerHTML = '';
            activePiecesData = [];
            for (let i = 0; i < 3; i++) {
                const type = PIECE_TYPES[Math.floor(Math.random() * PIECE_TYPES.length)];
                const pieceObj = { ...type, id: Date.now() + i };
                activePiecesData.push(pieceObj);
                renderPiece(pieceObj);
            }
        }

        function renderPiece(piece) {
            const container = document.createElement('div');
            container.classList.add('piece');
            container.id = `piece-${piece.id}`;
            container.style.gridTemplateColumns = `repeat(${piece.shape[0].length}, 1fr)`;
            
            piece.shape.forEach((row) => {
                row.forEach((value) => {
                    const cell = document.createElement('div');
                    cell.classList.add('piece-cell');
                    if (value) cell.style.backgroundColor = piece.color;
                    else cell.style.backgroundColor = 'transparent';
                    container.appendChild(cell);
                });
            });

            container.addEventListener('mousedown', (e) => startDrag(e, piece, container));
            container.addEventListener('touchstart', (e) => startDrag(e, piece, container), {passive: false});
            pieceSlots.appendChild(container);
        }

        function startDrag(e, piece, element) {
            e.preventDefault();
            const isTouch = e.type === 'touchstart';
            const clientX = isTouch ? e.touches[0].clientX : e.clientX;
            const clientY = isTouch ? e.touches[0].clientY : e.clientY;

            const clone = element.cloneNode(true);
            clone.classList.add('dragging');
            document.body.appendChild(clone);

            // Menyesuaikan ukuran clone saat di-drag agar sama dengan skala grid
            const gridCell = document.querySelector('.cell');
            const cellSize = gridCell.offsetWidth;
            const gap = 6; 
            const cells = clone.querySelectorAll('.piece-cell');
            cells.forEach(c => {
                c.style.width = cellSize + 'px';
                c.style.height = cellSize + 'px';
            });
            clone.style.gap = gap + 'px';
            clone.style.gridTemplateColumns = `repeat(${piece.shape[0].length}, ${cellSize}px)`;

            const moveAt = (x, y) => {
                // Offset agar kursor berada di tengah blok
                clone.style.left = x - (clone.offsetWidth / 2) + 'px';
                clone.style.top = y - (clone.offsetHeight / 2) - 50 + 'px';
            };

            moveAt(clientX, clientY);

            function onMouseMove(e) {
                const curX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
                const curY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
                moveAt(curX, curY);
            }

            const endDrag = (e) => {
                const endX = isTouch ? e.changedTouches[0].clientX : e.clientX;
                const endY = isTouch ? e.changedTouches[0].clientY : e.clientY;

                document.removeEventListener(isTouch ? 'touchmove' : 'mousemove', onMouseMove);
                
                // Ambil posisi tengah clone untuk deteksi grid
                const rect = clone.getBoundingClientRect();
                const centerX = rect.left + (cellSize / 2);
                const centerY = rect.top + (cellSize / 2);
                
                clone.remove();

                // Deteksi sel grid berdasarkan koordinat visual
                const targetCell = document.elementsFromPoint(centerX, centerY).find(el => el.classList.contains('cell'));

                if (targetCell) {
                    const row = parseInt(targetCell.dataset.row);
                    const col = parseInt(targetCell.dataset.col);
                    
                    // Kita letakkan blok dengan pojok kiri atas mulai dari targetCell
                    if (canPlace(piece.shape, row, col)) {
                        placePiece(piece, row, col);
                        element.style.visibility = 'hidden';
                        element.style.pointerEvents = 'none';
                        
                        // Hapus dari data aktif
                        activePiecesData = activePiecesData.filter(p => p.id !== piece.id);

                        const visiblePieces = Array.from(pieceSlots.children).filter(p => p.style.visibility !== 'hidden');
                        if (visiblePieces.length === 0) {
                            generateNewPieces();
                        }
                        
                        checkLines();
                        
                        if (isGameOver()) {
                            showGameOver();
                        }
                    }
                }
            };

            document.addEventListener(isTouch ? 'touchmove' : 'mousemove', onMouseMove);
            document.addEventListener(isTouch ? 'touchend' : 'mouseup', endDrag, { once: true });
        }

        function canPlace(shape, startRow, startCol) {
            for (let r = 0; r < shape.length; r++) {
                for (let c = 0; c < shape[r].length; c++) {
                    if (shape[r][c]) {
                        const targetRow = startRow + r;
                        const targetCol = startCol + c;
                        
                        if (targetRow >= GRID_SIZE || targetCol >= GRID_SIZE || 
                            grid[targetRow][targetCol] !== 0) {
                            return false;
                        }
                    }
                }
            }
            return true;
        }

        function placePiece(piece, startRow, startCol) {
            piece.shape.forEach((row, r) => {
                row.forEach((value, c) => {
                    if (value) {
                        grid[startRow + r][startCol + c] = piece.color;
                    }
                });
            });
            updateGridUI();
            score += (piece.shape.flat().filter(v => v).length) * 10;
            scoreElement.innerText = score;
        }

        function updateGridUI() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => {
                const r = cell.dataset.row;
                const c = cell.dataset.col;
                if (grid[r][c]) {
                    cell.classList.add('filled');
                    cell.style.backgroundColor = grid[r][c];
                } else {
                    cell.classList.remove('filled');
                    cell.style.backgroundColor = '';
                }
            });
        }

        function checkLines() {
            let rowsToDelete = [];
            let colsToDelete = [];

            for (let r = 0; r < GRID_SIZE; r++) {
                if (grid[r].every(cell => cell !== 0)) rowsToDelete.push(r);
            }

            for (let c = 0; c < GRID_SIZE; c++) {
                let columnFilled = true;
                for (let r = 0; r < GRID_SIZE; r++) {
                    if (grid[r][c] === 0) { columnFilled = false; break; }
                }
                if (columnFilled) colsToDelete.push(c);
            }

            if (rowsToDelete.length > 0 || colsToDelete.length > 0) {
                rowsToDelete.forEach(r => {
                    for (let c = 0; c < GRID_SIZE; c++) grid[r][c] = 0;
                });
                colsToDelete.forEach(c => {
                    for (let r = 0; r < GRID_SIZE; r++) grid[r][c] = 0;
                });

                const totalCleared = rowsToDelete.length + colsToDelete.length;
                score += totalCleared * 100;
                scoreElement.innerText = score;
                
                setTimeout(updateGridUI, 150);
            }
        }

        function isGameOver() {
            const visiblePieceElements = Array.from(pieceSlots.children).filter(p => p.style.visibility !== 'hidden');
            if (visiblePieceElements.length === 0) return false;

            const remainingPieces = visiblePieceElements.map(el => {
                const id = parseInt(el.id.split('-')[1]);
                return activePiecesData.find(p => p.id === id);
            }).filter(p => p !== undefined);

            for (let piece of remainingPieces) {
                for (let r = 0; r < GRID_SIZE; r++) {
                    for (let c = 0; c < GRID_SIZE; c++) {
                        if (canPlace(piece.shape, r, c)) return false;
                    }
                }
            }
            return true;
        }

        function showGameOver() {
            finalScoreElement.innerText = score;
            gameOverModal.classList.remove('hidden');
            gameOverModal.classList.add('flex');
        }

        function resetGame() {
            grid = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(0));
            score = 0;
            scoreElement.innerText = score;
            gameOverModal.classList.add('hidden');
            gameOverModal.classList.remove('flex');
            initGrid();
            generateNewPieces();
        }

        initGrid();
        generateNewPieces();
    </script>
</body>
</html>
